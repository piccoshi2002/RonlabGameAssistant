# -----------------------------------------------
# Ronlab Game Assistant - Minigame Configuration
# -----------------------------------------------
# world-type options:
#   TEMPLATE - copies a premade template world
#   VANILLA  - generates fresh interconnected overworld/nether/end
#
# For TEMPLATE type, template-world must match a world
# marked as template: true in worlds.yml
# -----------------------------------------------

