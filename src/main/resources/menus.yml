# -----------------------------------------------
# Ronlab Game Assistant - Menu Configuration
# -----------------------------------------------
# Action types:
#   rga:open_menu <menu_name>   - opens another menu
#   rga:last_location           - sends player to last SMP location
#   rga:tp <world_name>         - teleports player to world spawn
#   console:<command>           - runs command as console (%player% = player name)
#   player:<command>            - runs command as player
# -----------------------------------------------

menus:

  # ── Main Navigator Menu ──────────────────────────────────────
  navigator:
    title: "&8&lWorld Navigator"
    size: 27
    items:

      filler1:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
        slot: 0

      filler2:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
        slot: 8

      filler3:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
        slot: 18

      filler4:
        material: BLACK_STAINED_GLASS_PANE
        name: " "
        slot: 26

      option1:
        material: GRASS_BLOCK
        name: "&a&lReturn to SMP"
        lore:
          - "&7Return to your last known"
          - "&7location in the SMP."
        slot: 10
        left_click:
          - "rga:last_location"
        right_click:
          - "rga:last_location"

      option2:
        material: DIAMOND_BLOCK
        name: "&b&lCreative World"
        lore:
          - "&7Enter the Creative world."
        slot: 11
        left_click:
          - "rga:tp Creative"
        right_click:
          - "rga:tp Creative"

      option3:
        material: MAP
        name: "&e&lAdventure Map"
        lore:
          - "&7Enter the Adventure map."
        slot: 12
        left_click:
          - "rga:tp Adventure"
        right_click:
          - "rga:tp Adventure"

      option4:
        material: LEATHER_BOOTS
        name: "&d&lParkour"
        lore:
          - "&7Choose a parkour map."
          - ""
          - "&eClick to open"
        slot: 14
        left_click:
          - "rga:open_menu parkour"
        right_click:
          - "rga:open_menu parkour"

      option5:
        material: NETHER_STAR
        name: "&6&lMinigames"
        lore:
          - "&7Browse available minigames."
          - ""
          - "&eClick to open"
        slot: 16
        left_click:
          - "rga:open_menu minigames"
        right_click:
          - "rga:open_menu minigames"

