# -----------------------------------------------
# Ronlab Game Assistant - Minigame Configuration
# -----------------------------------------------
# world-type options:
#   TEMPLATE - copies a premade template world
#   VANILLA  - generates fresh interconnected overworld/nether/end
#
# start-commands - run automatically after all players are teleported in
#   Prefixes:
#     console:     - runs as console (default if no prefix)
#     console:     - runs as console (default if no prefix)
#     player-each: - runs once per player, %player% = each player's name
#     leader:      - runs as the party leader player (use for GUI commands)
#
#   Placeholders:
#     %world%   - the generated world name
#     %leader%  - party leader's name
#     %players% - comma-separated list of all player names
#     %player%  - used with player-each prefix only
#
# Examples:
#   start-commands:
#     - "console: manhunt start %world%"
#     - "console: team assign runner %leader%"
#     - "player-each: tell %player% Good luck!"
# -----------------------------------------------

minigames:

  manhunt:
    name: "Manhunt"
    display-item: COMPASS
    display-lore:
      - "&7Runners try to beat the game."
      - "&7Hunters try to stop them."
      - "&7First to kill the Ender Dragon wins!"
    max-players: 8
    min-players: 2
    world-type: VANILLA
    start-commands: []
    world-settings:
      gamemode: SURVIVAL
      pvp: true
      difficulty: NORMAL
      gamerules:
        showLocatorBar: false
        keepInventory: false
        announceAdvancements: false
        doImmediateRespawn: false
        naturalRegeneration: true

