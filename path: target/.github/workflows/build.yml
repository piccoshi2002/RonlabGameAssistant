name: Build RonlabGameAssistant

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package --no-transfer-progress

      - name: List jar contents
        run: jar tf target/RonlabGameAssistant-1.0.0.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: RonlabGameAssistant
          path: target/RonlabGameAssistant-1.0.0.jar
